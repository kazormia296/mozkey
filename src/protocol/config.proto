// Protocol messages to be used for mozc configuration.
syntax = "proto2";

package mozc.config;

option java_outer_classname = "ProtoConfig";
option java_package = "org.mozc.android.inputmethod.japanese.protobuf";

message GeneralConfig {
  //////////////////////////////////////////////////////////////
  //
  // General config (1-9)
  //

  // config version, corresponding to the suffix of config file
  optional uint32 config_version = 1 [default = 0];

  // The product version that wrote this config
  optional string last_modified_product_version = 2 [default = "0.0.0.0"];

  // last modified time in UTC second
  optional uint64 last_modified_time = 3 [default = 0, jstype = JS_STRING];

  // These fields are not used now
  // platform of machine that wrote this config
  optional string platform = 4 [default = ""];

  // UI locale of machine that wrote this config
  optional string ui_locale = 5 [default = ""];

  // Whether to upload usage stats
  // This flag is used only for Android.
  optional bool upload_usage_stats = 6 [default = false];
}

message Config {
  reserved 2 to 9;  // Moved to GeneralConfig

  // General config and logging/debugging:
  // We won't use 2-9 and 20-39 ids anymore for historical reasons.
  optional GeneralConfig general_config = 1;

  //////////////////////////////////////////////////////////////
  //
  // Logging/Debugging (10-19)
  //

  // set verbose level of logging library (FLAGS_v)
  optional int32 verbose_level = 10 [default = 0];

  reserved 11;
  reserved "log_all_commands";

  //////////////////////////////////////////////////////////////
  //
  // Misc fields (20-39)
  //

  // Incognito mode:
  // Disable all mutable operation if incognito_mode is true
  // Clients needs to check ConversionRequest::incognito_mode() instead
  // of Config::incognito_mode(), as the incoginto mode can also set
  // via Options.
  optional bool incognito_mode = 20 [default = false];

  reserved 21;
  reserved "upload_usage_stats";

  // whether to show the set default dialog on startup
  optional bool check_default = 22 [default = true];

  // Presentation mode:
  // disable all suggestion temporally.
  optional bool presentation_mode = 23 [default = false];

  //////////////////////////////////////////////////////////////
  //
  // Basic features (40-79)
  //
  enum PreeditMethod {
    ROMAN = 0;
    KANA = 1;
  }

  // Roman/Kana
  optional PreeditMethod preedit_method = 40 [default = ROMAN];

  enum SessionKeymap {
    // If NONE is selected, it will be replaced with MSIME or KOTOERI.
    // NONE is used only for a placeholder, so a configuration program
    // should not show NONE as one of selections.  NONE should be the
    // last of the items due to the limitation of the Qt GUI's
    // implementation. Note that keymap number should be correspoinding
    // to the index of QComboBox in config dialog. Since NONE is not
    // used, we set -1 here.
    NONE = -1;
    CUSTOM = 0;
    ATOK = 1;
    MSIME = 2;
    KOTOERI = 3;
    MOBILE = 4;
    CHROMEOS = 5;
    OVERLAY_HENKAN_MUHENKAN_TO_IME_ON_OFF = 100;
    OVERLAY_FOR_TEST = 10000;
  }
  optional SessionKeymap session_keymap = 41 [default = NONE];

  // custom keymap
  // TODO(taku): replace it with repeated field
  optional bytes custom_keymap_table = 42;

  // custom roman table
  optional bytes custom_roman_table = 43;

  enum PunctuationMethod {
    TOUTEN_KUTEN = 0;
    COMMA_PERIOD = 1;
    TOUTEN_PERIOD = 2;
    COMMA_KUTEN = 3;
  }
  optional PunctuationMethod punctuation_method = 45 [default = TOUTEN_KUTEN];

  enum SymbolMethod {
    CORNER_BRACKET_MIDDLE_DOT = 0;
    SQUARE_BRACKET_SLASH = 1;
    CORNER_BRACKET_SLASH = 2;
    SQUARE_BRACKET_MIDDLE_DOT = 3;
  }
  optional SymbolMethod symbol_method = 46
      [default = CORNER_BRACKET_MIDDLE_DOT];

  enum FundamentalCharacterForm {
    FUNDAMENTAL_INPUT_MODE = 0;  // follow the input mode
    FUNDAMENTAL_FULL_WIDTH = 1;  // always FullWidth
    FUNDAMENTAL_HALF_WIDTH = 2;  // always HalfWidth
  }
  optional FundamentalCharacterForm space_character_form = 47
      [default = FUNDAMENTAL_INPUT_MODE];

  // If this flag is true, Mozc toggles preedit method with some predefined
  // key events when IME is turned on.  Otherwise, Mozc ignores such kind of
  // key events so that their preferred can be preserved even when the toggle
  // key is pressed by accident.
  // As for Mozc, only Windows client supports such kind of toggle so this flag
  // is currently valid only on Windows.
  //
  // Background:
  //   Traditional Japanese IMEs have used "Roma-Ji" key in Japanese 106/109
  //   keyboard to toggle the preedit method between Roman and Kana style and
  //   this behavior was finally adopted into JIS X 4064:2002 as a basic
  //   functionality which is expected to support by a Japanese Input Method.
  //   However, people who are not aware of this functionality have been
  //   puzzled because the default key stroke is likely to be pressed
  //   by accident.
  optional bool use_keyboard_to_change_preedit_method = 48 [default = false];

  // User history learning
  enum HistoryLearningLevel {
    DEFAULT_HISTORY = 0;
    READ_ONLY = 1;
    NO_HISTORY = 2;
  }
  optional HistoryLearningLevel history_learning_level = 50
      [default = DEFAULT_HISTORY];

  // The style of candidate selection shortcut.
  // Note that if the current Request has SpecialRomajiTable (== the keyevent
  // is from a virtual keyboard), shortcut is no-op.
  enum SelectionShortcut {
    NO_SHORTCUT = 0;
    SHORTCUT_123456789 = 1;
    SHORTCUT_ASDFGHJKL = 2;
  }
  optional SelectionShortcut selection_shortcut = 52
      [default = SHORTCUT_123456789];

  // character form (Halfwidth/Fullwidth
  enum CharacterForm {
    HALF_WIDTH = 0;
    FULL_WIDTH = 1;
    LAST_FORM = 2;
    NO_CONVERSION = 3;
  }
  message CharacterFormRule {
    optional string group = 1;
    optional CharacterForm preedit_character_form = 2 [default = FULL_WIDTH];
    optional CharacterForm conversion_character_form = 3 [default = FULL_WIDTH];
  }
  repeated CharacterFormRule character_form_rules = 54;

  // Automatically switch composition mode.
  optional bool auto_switch_composition_mode = 56 [default = true];

  // Toggle to use cascanding window for debugging.
  optional bool use_cascading_window = 58 [default = true];

  // Shift key mode switch
  enum ShiftKeyModeSwitch {
    OFF = 0;                  // Case insensitive
    ASCII_INPUT_MODE = 1;     // MSIME, ATOK behavior
    KATAKANA_INPUT_MODE = 2;  // Kotoeri behavior
  }
  optional ShiftKeyModeSwitch shift_key_mode_switch = 59
      [default = ASCII_INPUT_MODE];

  enum NumpadCharacterForm {
    NUMPAD_INPUT_MODE = 0;
    NUMPAD_FULL_WIDTH = 1;
    NUMPAD_HALF_WIDTH = 2;
    NUMPAD_DIRECT_INPUT = 3;
  }
  optional NumpadCharacterForm numpad_character_form = 60
      [default = NUMPAD_HALF_WIDTH];

  enum AutoConversionKey {
    AUTO_CONVERSION_OFF = 0;
    AUTO_CONVERSION_KUTEN = 1;
    AUTO_CONVERSION_TOUTEN = 2;
    AUTO_CONVERSION_QUESTION_MARK = 4;
    AUTO_CONVERSION_EXCLAMATION_MARK = 8;
  }
  optional bool use_auto_conversion = 61 [default = false];

  // can't use AutoConversionKey as a type since
  // undefined enum type is not correctly handled.
  optional uint32 auto_conversion_key = 62 [default = 13];

  enum DirectCommitKey {
    DIRECT_COMMIT_OFF = 0;
    DIRECT_COMMIT_KUTEN = 1;
    DIRECT_COMMIT_TOUTEN = 2;
    DIRECT_COMMIT_QUESTION_MARK = 4;
    DIRECT_COMMIT_EXCLAMATION_MARK = 8;
    DIRECT_COMMIT_OPEN_PARENTHESIS = 16;
    DIRECT_COMMIT_CLOSE_PARENTHESIS = 32;
    DIRECT_COMMIT_OPEN_BRACKET = 64;
    DIRECT_COMMIT_CLOSE_BRACKET = 128;
    DIRECT_COMMIT_MIDDLE_DOT = 256;
  }
  optional bool use_direct_commit = 1001 [default = false];

  // can't use DirectCommitKey as a type since
  // undefined enum type is not correctly handled.
  optional uint32 direct_commit_key = 1002 [default = 0];

  // Mac only config items: yen_sign_character and use_japanese_layout.
  enum YenSignCharacter {
    YEN_SIGN = 0;
    BACKSLASH = 1;
  }
  // Mac-original JIS key layout has "yen-sign" key which generates
  // U+00A5 instead of U+005C and sometimes users get troubles with
  // them because they expect backslashes which are rendered as
  // yen-sign.  If this configuration is BACKSLASH, Mozc will
  // interpret U+005C even when the original key event is U+00A5.
  optional YenSignCharacter yen_sign_character = 63 [default = YEN_SIGN];

  // Use Japanese keyboard layout even when the user uses other
  // keyboard layouts.  In Mac OSX people can use several keyboard
  // layouts such like French or Spanish but some people want to use
  // Japanese layout for Japanese.  See http://b/2917320
  optional bool use_japanese_layout = 64 [default = false];

  // Use kana modifier insensitive conversion.
  // e.g. かつこう -> 学校
  // Note that Request message has the same field.
  // - Request's one is controlled by the client. A user cannot control it.
  //   On the other hand Config's is under a user's control.
  // - Whether the feature is activated or not is decided by logical-AND
  //   of Request's and Config's.
  optional bool use_kana_modifier_insensitive_conversion = 65 [default = false];

  // Use typing correction feature.
  // e.g. sunkai -> 深海
  optional bool use_typing_correction = 66 [default = false];

  // The duration in millisecond to determine the timeout.
  // If the duration between key inputs is more than this value,
  // a SessionCommand::STOP_KEY_TOGGLING is prepended to the next key input.
  // If the value is 0, STOP_KEY_TOGGLING is not sent.
  optional int32 composing_timeout_threshold_msec = 67 [default = 0];

  // The keymaps which are loaded on top of `session_keymap`.
  // Overlay keymaps are prioritized over `session_keymap`.
  // They are used to partially modify the session keymap, for example
  // using Henkan key as IME_ON.
  repeated SessionKeymap overlay_keymaps = 68 [packed = true];

  // Use live conversion.
  // If this is true, the current composition is converted on every character
  // input without committing the previous live conversion result.
  optional bool use_live_conversion = 69 [default = false];

  // Delay in milliseconds before applying live conversion after character input.
  // If this value is 0, live conversion is applied immediately.
  optional uint32 live_conversion_delay_msec = 70 [default = 228];

  // Minimum reading length in Unicode characters before live conversion is
  // allowed.  The default keeps single-character particles such as 「に」,
  // 「を」, and 「が」 from being converted too eagerly while typing.
  optional uint32 live_conversion_min_key_length = 71 [default = 2];

  // When live conversion is disabled, the initial Convert command in
  // composition mode opens the conversion candidate window without advancing
  // the focused candidate.
  optional bool show_candidate_window_on_initial_conversion = 72
      [default = false];

  // Experimental: use asynchronous zenz live correction after normal live
  // conversion. This is intentionally default-off until the feature is verified.
  optional bool use_zenz_live_correction = 1003 [default = false];

  // Debounce in milliseconds before submitting a zenz live correction request
  // after normal live conversion has become visible.
  optional uint32 zenz_live_correction_delay_msec = 1004 [default = 1000];

  // Timeout in milliseconds for one zenz live correction request.
  optional uint32 zenz_live_correction_timeout_msec = 1005 [default = 180];

  // Minimum reading length in Unicode characters before zenz is allowed to run.
  optional uint32 zenz_live_correction_min_key_length = 1006 [default = 2];

  // Maximum left context length in Unicode characters.
  // The runtime sanitizer may further drop this context when it looks sensitive.
  optional uint32 zenz_live_correction_left_context_length = 1007 [default = 24];

  // Allow zenz output not found in Mozc candidates to be shown as a synthetic
  // live preedit. v0 uses this only for live preedit display, not dictionary
  // registration.
  optional bool use_zenz_synthetic_candidate = 1008 [default = true];

  // Windows named pipe endpoint for zenz_scorer.exe.
  optional string zenz_live_correction_pipe_name = 1009
      [default = "\\\\.\\pipe\\mozc_zenz_scorer"];

  // Debug logging for zenz live correction.
  optional bool zenz_live_correction_debug = 1010 [default = false];

  // Experimental: record and reuse local feedback for zenz live correction.
  // This stores only local TSV data and never sends feedback outside the machine.
  // Raw left context is not stored.
  optional bool use_zenz_feedback_learning = 1011 [default = false];

  // Zenzai v3/v3.2 condition fields. Empty values are omitted from the prompt.
  // These are not chat prompts; they are mapped to zenz special-token fields:
  // U+EE03 profile, U+EE04 topic, U+EE05 style, U+EE06 settings.
  optional string zenz_live_correction_profile = 1012 [default = ""];
  optional string zenz_live_correction_topic = 1013 [default = ""];
  optional string zenz_live_correction_style = 1014 [default = ""];
  optional string zenz_live_correction_settings = 1015 [default = ""];

  // Zenzai v3.2 right-context support. The actual text is taken from
  // commands::Context::following_text when the client supplies it.
  optional bool use_zenz_live_correction_right_context = 1016
      [default = true];
  optional uint32 zenz_live_correction_right_context_length = 1017
      [default = 24];

  //////////////////////////////////////////////////////////////
  //
  // Dictionary (80-99)
  //
  optional bool use_date_conversion = 80 [default = true];
  optional bool use_single_kanji_conversion = 81 [default = true];
  optional bool use_symbol_conversion = 82 [default = true];
  optional bool use_number_conversion = 83 [default = true];
  optional bool use_emoticon_conversion = 84 [default = true];
  optional bool use_calculator = 85 [default = true];
  optional bool use_t13n_conversion = 86 [default = true];
  optional bool use_zip_code_conversion = 87 [default = true];
  optional bool use_spelling_correction = 88 [default = true];

  // If use_emoji_conversion is true, the user can input emoji characters
  // by converting from a query string (e.g. "いぬ → 🐶" [U+1F436]).
  // Even if it is false, users might be able to input emoji characters
  // with other ways.
  // Note: Some characters can be either of text and emoji.  It would be ideal
  // to use the variation sequence to specify emoji presentation [U+FE0E],
  // although it is not implemented yet.
  // See: http://unicode.org/reports/tr51/#Presentation_Style
  optional bool use_emoji_conversion = 89 [default = false];

  message InformationListConfig {
    optional bool use_local_usage_dictionary = 1 [default = true];
    reserved 2;
    reserved "use_web_usage_dictionary";
    reserved 10;
    reserved "web_service_entries";
  }
  optional InformationListConfig information_list_config = 90;

  //////////////////////////////////////////////////////////////
  //
  // Suggest (100-119)
  //
  // Suggest is a feature of word suggestion with prefix search.
  // When you type "あ", you may get "ありがとう", "朝" (あさ), "明日" (あした)
  // as suggested words.
  //
  // Use history-based suggest feature.
  // If this is true, your previously typed words are prioritized.
  optional bool use_history_suggest = 100 [default = true];

  // Use dictionary-based suggest feature.
  // If this is true, words in the word dictionary are suggested even if
  // you haven't typed before.
  optional bool use_dictionary_suggest = 101 [default = true];

  // Use realtime conversion feature.
  optional bool use_realtime_conversion = 102 [default = true];

  // Size of suggestions.
  optional uint32 suggestions_size = 110 [default = 3];

  //////////////////////////////////////////////////////////////
  //
  // Renderer (120-179)
  //
  // Use mode indicator feature.
  optional bool use_mode_indicator = 120 [default = true];

  // Use dark mode for candidate window and ruby overlay on Windows.
  // Deprecated UI-wise. Newer clients should use the per-window appearance
  // settings below and keep this field synchronized for backward compatibility.
  optional bool use_dark_mode_candidate_window = 121 [default = false];

  // Customize preedit display attributes on Windows TSF.
  // Color values are stored as 0xRRGGBB, not Windows COLORREF.

  // Raw/input preedit text.
  optional bool use_custom_preedit_text_color = 122 [default = false];
  optional uint32 preedit_text_color = 123 [default = 0xff5000];

  optional bool use_custom_preedit_background_color = 124 [default = false];
  optional uint32 preedit_background_color = 125 [default = 0xffffcc];

  optional bool use_custom_preedit_underline_color = 126 [default = false];
  optional uint32 preedit_underline_color = 127 [default = 0xff0000];

  // Converted/target preedit segment.
  optional bool use_custom_preedit_target_text_color = 128 [default = false];
  optional uint32 preedit_target_text_color = 129 [default = 0x000000];

  optional bool use_custom_preedit_target_background_color = 130 [default = false];
  optional uint32 preedit_target_background_color = 131 [default = 0xddeeff];

  optional bool use_custom_preedit_target_underline_color = 132 [default = false];
  optional uint32 preedit_target_underline_color = 133 [default = 0x0066ff];

  // Font family name for candidate and ruby windows on Windows.
  // Empty string means the platform/default font.
  optional string candidate_ruby_font_name = 134 [default = ""];

  // Show ruby window during live conversion on Windows.
  optional bool show_live_conversion_ruby_window = 135 [default = true];


  enum RendererWindowColorTheme {
    RENDERER_WINDOW_COLOR_LIGHT = 0;
    RENDERER_WINDOW_COLOR_DARK = 1;
    RENDERER_WINDOW_COLOR_CUSTOM = 2;
    RENDERER_WINDOW_COLOR_FOLLOW_CANDIDATE = 3;
  }

  message CandidateWindowColorPalette {
    // Color values are stored as 0xRRGGBB, not Windows COLORREF.
    optional uint32 background_color = 1 [default = 0xffffff];
    optional uint32 text_color = 2 [default = 0x000000];
    optional uint32 selected_background_color = 3 [default = 0xd1eaff];
    optional uint32 selected_border_color = 4 [default = 0x7facdd];
    optional uint32 border_color = 5 [default = 0x969696];
    optional uint32 shortcut_text_color = 6 [default = 0x777777];
    optional uint32 shortcut_background_color = 7 [default = 0xf3f4ff];
    optional uint32 description_text_color = 8 [default = 0x888888];
    optional uint32 footer_text_color = 9 [default = 0x4c4c4c];
    optional uint32 footer_background_color = 10 [default = 0xffffff];
    optional uint32 footer_border_color = 11 [default = 0x606060];
    optional uint32 scrollbar_background_color = 12 [default = 0xe0e0e0];
    optional uint32 scrollbar_indicator_color = 13 [default = 0x7590b8];
  }

  message RubyWindowColorPalette {
    // Color values are stored as 0xRRGGBB, not Windows COLORREF.
    optional uint32 background_color = 1 [default = 0xffffff];
    optional uint32 text_color = 2 [default = 0x000000];
    optional uint32 border_color = 3 [default = 0x969696];
  }

  // Candidate, prediction/suggestion, and ruby window appearance on Windows.
  // CONVERSION, TRANSLITERATION, and USAGE use the candidate window appearance.
  // PREDICTION and SUGGESTION use the suggest window appearance.
  // RubyWindow has its own compact palette.
  optional RendererWindowColorTheme candidate_window_color_theme = 136
      [default = RENDERER_WINDOW_COLOR_LIGHT];
  optional CandidateWindowColorPalette candidate_window_custom_color_palette =
      137;

  optional RendererWindowColorTheme suggest_window_color_theme = 138
      [default = RENDERER_WINDOW_COLOR_FOLLOW_CANDIDATE];
  optional CandidateWindowColorPalette suggest_window_custom_color_palette =
      139;

  optional RendererWindowColorTheme ruby_window_color_theme = 140
      [default = RENDERER_WINDOW_COLOR_FOLLOW_CANDIDATE];
  optional RubyWindowColorPalette ruby_window_custom_color_palette = 141;

  // Window corner radius. 0 means square corners.
  optional uint32 candidate_window_custom_corner_radius = 142 [default = 6];
  optional uint32 suggest_window_custom_corner_radius = 143 [default = 6];
  optional uint32 ruby_window_custom_corner_radius = 144 [default = 9];

  // Candidate-like and ruby window size. 100 means the current default size.
  optional uint32 candidate_window_size_percent = 145 [default = 100];
  optional uint32 suggest_window_size_percent = 146 [default = 100];
  optional uint32 ruby_window_size_percent = 147 [default = 100];

  // Whole-window opacity. 100 is fully opaque. Values are clamped by the
  // renderer so that the UI cannot become accidentally invisible.
  optional uint32 candidate_window_opacity_percent = 148 [default = 100];
  optional uint32 suggest_window_opacity_percent = 149 [default = 100];
  optional uint32 ruby_window_opacity_percent = 150 [default = 90];

  // Custom shadow. Size 0, distance 0 with size 0, or opacity 0 disables
  // the custom shadow. Size and distance are logical pixels and are DPI-scaled
  // by the renderer. Angle is screen-space degrees: 0=right, 45=down-right,
  // 90=down. Distance 0 creates an even shadow on all sides.
  optional uint32 candidate_window_shadow_size = 151 [default = 12];
  optional uint32 candidate_window_shadow_opacity_percent = 152 [default = 30];
  optional uint32 candidate_window_shadow_angle_degrees = 153 [default = 45];
  optional uint32 candidate_window_shadow_distance = 154 [default = 6];
  optional uint32 suggest_window_shadow_size = 155 [default = 12];
  optional uint32 suggest_window_shadow_opacity_percent = 156 [default = 30];
  optional uint32 suggest_window_shadow_angle_degrees = 157 [default = 45];
  optional uint32 suggest_window_shadow_distance = 158 [default = 6];
  optional uint32 ruby_window_shadow_size = 159 [default = 10];
  optional uint32 ruby_window_shadow_opacity_percent = 160 [default = 28];
  optional uint32 ruby_window_shadow_angle_degrees = 161 [default = 90];
  optional uint32 ruby_window_shadow_distance = 162 [default = 4];

  enum WindowsImeIconStyle {
    WINDOWS_IME_ICON_DEFAULT = 0;
    WINDOWS_IME_ICON_MONOCHROME_BLACK = 1;
    WINDOWS_IME_ICON_MONOCHROME_WHITE = 2;
  }
  optional WindowsImeIconStyle windows_ime_icon_style = 163
      [default = WINDOWS_IME_ICON_DEFAULT];

  //////////////////////////////////////////////////////////////
  //
  // Cloud (300-319)
  //
  // Configuration for cloud sync feature. This field is obsolete.
  reserved 300;
  reserved "sync_config";
  reserved 301;
  reserved "allow_cloud_handwriting";
  reserved 996;
  reserved "pinyin_config";
  reserved 998;
  reserved "hangul_config";
  reserved 999;
  reserved "chewing_config";
}
