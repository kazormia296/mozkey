name: ビルドエラー / Build error
description: Mozkey のビルドに失敗する場合の報告
title: 'Build error: '
labels: ['build']

body:
  - type: markdown
    attributes:
      value: |
        ビルドエラーの報告ありがとうございます。

        報告前に、可能であれば以下を確認してください。

        - このリポジトリの最新 CI 状態:
          https://github.com/kazormia296/mozkey-ibg/actions
        - このリポジトリの README / Release notes
        - Mozc 共通のビルドシステムに関する問題の場合は、upstream Mozc のビルド手順

        upstream Mozc のビルド手順:
        - Linux: https://github.com/google/mozc/blob/master/docs/build_mozc_for_linux.md
        - macOS: https://github.com/google/mozc/blob/master/docs/build_mozc_in_osx.md
        - Windows: https://github.com/google/mozc/blob/master/docs/build_mozc_in_windows.md

  - type: textarea
    id: description
    attributes:
      label: 内容
      description: どのようなビルドエラーが発生したかを説明してください。
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Mozkey のバージョンまたは commit ID
      description: 可能であれば最新の commit / 最新リリースでも再現するか確認してください。
      placeholder: '例: Mozkey v0.7.1 または d50a8b9ae28c4fba265f734b38bc5ae392fe4d25'
    validations:
      required: true

  - type: dropdown
    id: target
    attributes:
      label: ビルド対象
      options:
        - Windows installer
        - Windows binaries
        - macOS package
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: ビルド元
      description: どのソースコードをビルドしましたか？
      options:
        - kazormia296/mozkey-ibg main
        - kazormia296/mozkey-ibg release tag
        - my local branch
        - upstream google/mozc
        - other fork
    validations:
      required: false

  - type: input
    id: os
    attributes:
      label: OS バージョン
      placeholder: '例: Windows 11 24H2, Ubuntu 24.04, macOS 15.1'
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: ビルド環境
      value: |
        - Python version:
        - Bazel / Bazelisk version:
        - Visual Studio / MSVC version:
        - Windows SDK version:
        - Qt version:
        - Other relevant tools:
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: 実行したビルドコマンド
      description: 実際に実行したコマンドをそのまま貼ってください。
      value: |
        1. git ...
        2. cd ...
        3. bazel ...
        4. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: エラーログ
      description: 関連するエラーログを貼ってください。最後の失敗行だけでなく、最初に出たエラーも含めてください。
      render: shell
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 補足情報
      description: その他、調査に役立ちそうな情報があれば記載してください。
    validations:
      required: false
