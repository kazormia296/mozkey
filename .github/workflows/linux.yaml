name: CI for Linux
# https://github.com/google/mozc/blob/master/docs/build_mozc_for_linux.md

# Run on push.
on: push

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare_daily_dictionary:
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Offline dictionary and quality tooling smoke
        run: |
          python tools/dictionary/fixed_corpus_quality_gate.py smoke \
            --out-dir dist/quality/fixed-corpus-smoke
          python -m unittest \
            tools.dictionary.prepare_daily_dictionary_linux_test \
            tools.dictionary.fixed_corpus_quality_gate_test
          python tools/dictionary/prepare_daily_dictionary_linux.py --source-mode sample

      - name: Prepare daily dictionary
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python tools/dictionary/prepare_daily_dictionary_linux.py --source-mode download

      - name: Upload dictionary and quality diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v6
        with:
          name: linux-dictionary-quality-diagnostics
          path: |
            dist/quality/**
            dist/dictionary/linux-daily-source-manifest.json
          if-no-files-found: warn

      - name: Upload daily dictionary
        uses: actions/upload-artifact@v6
        with:
          name: daily-dictionary
          path: |
            src/data/dictionary_koyasi/generated/**
            dist/dictionary/**
          if-no-files-found: error

  build:
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Download daily dictionary
        uses: actions/download-artifact@v6
        with:
          name: daily-dictionary
          path: .

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y libibus-1.0-dev qt6-base-dev
          #
          # Unset the Android NDK setting to skip the unnecessary configuration.
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV

      - name: bazel build
        working-directory: ./src
        run: |
          bazelisk build package --config release_build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: mozc.zip
          path: src/bazel-bin/unix/mozc.zip
          if-no-files-found: warn

  test:
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Download daily dictionary
        uses: actions/download-artifact@v6
        with:
          name: daily-dictionary
          path: .

      - name: Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y libibus-1.0-dev qt6-base-dev
          #
          # Unset the Android NDK setting to skip the unnecessary configuration.
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV

      - name: bazel test
        working-directory: ./src
        run: |
          bazelisk test ... -c dbg
