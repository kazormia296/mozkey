name: CI for Linux
# https://github.com/google/mozc/blob/master/docs/build_mozc_for_linux.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      release:
        description: Build and package Linux release artifacts
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: ci-linux-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare_daily_dictionary:
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Offline dictionary and quality tooling smoke
        run: |
          python tools/dictionary/fixed_corpus_quality_gate.py smoke \
            --out-dir dist/quality/fixed-corpus-smoke
          python -m unittest \
            tools.dictionary.daily_source_lock_test \
            tools.dictionary.prepare_daily_dictionary_linux_test \
            tools.dictionary.prepare_release_dictionary_native_test \
            tools.dictionary.verify_release_dictionary_artifact_test \
            tools.dictionary.fixed_corpus_quality_gate_test
          python tools/dictionary/prepare_daily_dictionary_linux.py --source-mode sample

      - name: Prepare daily dictionary
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          python tools/dictionary/prepare_daily_dictionary_linux.py \
            --source-mode download \
            --profile release-approved-only \
            --backend native

      - name: Upload dictionary and quality diagnostics
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: linux-dictionary-quality-diagnostics
          path: |
            dist/quality/**
            dist/dictionary/linux-daily-source-manifest.json
            dist/dictionary/linux-release-approved-output-manifest.json
          if-no-files-found: warn
          overwrite: true
          retention-days: 7

      - name: Upload release-approved dictionary outputs
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: linux-release-approved-dictionary
          path: |
            src/data/dictionary_koyasi/generated/profiled/koyasi-syntax-guard.txt
            src/data/dictionary_koyasi/generated/profiled/mozcdic-ut-daily.txt
            src/data/dictionary_koyasi/generated/profiled/mozcdic-ut-personal-names-daily.txt
            dist/dictionary/linux-release-approved-output-manifest.json
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  build:
    if: ${{ inputs.release == true }}
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: linux-release-approved-dictionary
          path: .

      - name: Verify release-approved dictionary allowlist
        run: python tools/dictionary/verify_release_dictionary_artifact.py --root .

      - name: Setup
        run: |
          tools/release/use_ubuntu_snapshot.sh
          sudo apt-get install -y \
            appstream \
            build-essential \
            cmake \
            diffutils \
            dpkg-dev \
            fcitx5-modules-dev \
            file \
            gettext \
            libibus-1.0-dev \
            ninja-build \
            qt6-base-dev \
            xz-utils
          #
          # Unset the Android NDK setting to skip the unnecessary configuration.
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV

      - name: Restore pinned llama.cpp source cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache/llama.cpp-b9637.tar.gz
          key: linux-llama-b9637-${{ hashFiles('tools/release/prepare_linux_zenz_runtime.py', 'tools/release/prepare_macos_zenz_runtime.py') }}

      - name: Build pinned CPU-only Linux llama-server
        run: python3 tools/release/prepare_linux_zenz_runtime.py

      - name: Record the Ubuntu package build environment
        run: |
          mkdir -p dist
          dpkg-query -W \
            -f='${binary:Package} ${Version}\n' \
            appstream \
            build-essential \
            fcitx5-modules-dev \
            libc6 \
            qt6-base-dev \
            > dist/ubuntu-build-packages.txt

      - name: Build and attest Mozkey Linux targets on Ubuntu
        run: scripts/build_mozkey_linux_bazel ubuntu-layout

      - name: Validate Ubuntu runtime, inference, and multiarch staging
        working-directory: ./src
        run: |
          runtime="${GITHUB_WORKSPACE}/dist/zenz/linux/runtime/llama-server"
          runtime_sha256="$(sha256sum "${runtime}" | awk '{print $1}')"
          MOZKEY_LINUX_BUILD_LAYOUT=ubuntu-layout \
            MOZKEY_LLAMA_ATTESTED_SHA256="${runtime_sha256}" \
            MOZKEY_ZENZ_LLAMA_SERVER_TARGET="${runtime}" \
            MOZKEY_ZENZ_LLAMA_SERVER_SOURCE="${runtime}" \
            ../scripts/preflight_mozkey_linux_bazel
          MOZKEY_LINUX_PREFLIGHT_DONE=1 \
            ../scripts/smoke_test_mozkey_fcitx5_install
          ../scripts/probe_zenz_runtime_bazel \
            --layout ubuntu-layout \
            --llama-server "${runtime}" \
            --llama-server-sha256 "${runtime_sha256}"

      - name: Build the Debian/Ubuntu package and provenance
        run: |
          MOZKEY_LINUX_OUTPUT_DIR="$(pwd)/dist" \
            scripts/package_mozkey_linux_deb

      - name: Upload the verified Debian/Ubuntu product
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-linux-ubuntu-x86_64
          path: |
            dist/mozkey-ibg_*_amd64.deb
            dist/mozkey-v*-ubuntu-x86_64.build-attestation.json
            dist/mozkey-v*-ubuntu-x86_64.spdx.json
            dist/ubuntu-build-packages.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  package_fedora:
    if: ${{ inputs.release == true }}
    needs: [prepare_daily_dictionary, test]
    runs-on: ubuntu-24.04
    timeout-minutes: 150
    container: fedora@sha256:99e203b80b1c3d8f7e161ec10a68fd02b081ef83a3963553e513c82846b97814
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Bootstrap the fixed Fedora repository for checkout
        run: |
          rm -f -- /etc/yum.repos.d/*.repo
          cat > /etc/yum.repos.d/mozkey-fedora-snapshot.repo <<'EOF'
          [fedora]
          name=Fedora 42 Everything archive
          baseurl=https://archives.fedoraproject.org/pub/archive/fedora/linux/releases/42/Everything/\$basearch/os/
          enabled=1
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-fedora-42-primary
          metadata_expire=never

          [updates]
          name=Fedora 42 updates archive
          baseurl=https://archives.fedoraproject.org/pub/archive/fedora/linux/updates/42/Everything/\$basearch/
          enabled=1
          gpgcheck=1
          gpgkey=file:///etc/pki/rpm-gpg/RPM-GPG-KEY-fedora-42-primary
          metadata_expire=never
          EOF
          dnf clean all
          dnf -y install git

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Install the Fedora target build environment
        run: |
          tools/release/use_fedora_snapshot.sh
          dnf -y --setopt=install_weak_deps=False install \
            appstream \
            cmake \
            cpio \
            diffutils \
            fcitx5-devel \
            file \
            gcc-c++ \
            gettext \
            git \
            java-latest-openjdk-devel \
            make \
            ninja-build \
            nodejs \
            npm \
            python3 \
            qt6-qtbase-devel \
            rpm-build \
            tar \
            unzip \
            which \
            xz \
            zip

      - name: Download release-approved dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: linux-release-approved-dictionary
          path: .

      - name: Verify dictionary and trust the ephemeral checkout
        run: |
          python3 tools/dictionary/verify_release_dictionary_artifact.py --root .
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Build pinned CPU-only Linux llama-server
        run: python3 tools/release/prepare_linux_zenz_runtime.py

      - name: Record the Fedora package build environment
        run: |
          mkdir -p dist
          rpm -qa --qf '%{NAME}-%{VERSION}-%{RELEASE}.%{ARCH}\n' \
            | LC_ALL=C sort > dist/fedora-build-packages.txt

      - name: Build and attest the Fedora x86_64 product
        run: scripts/build_mozkey_linux_bazel fedora-x86_64

      - name: Validate Fedora runtime, inference, and staging
        working-directory: ./src
        run: |
          runtime="${GITHUB_WORKSPACE}/dist/zenz/linux/runtime/llama-server"
          runtime_sha256="$(sha256sum "${runtime}" | awk '{print $1}')"
          MOZKEY_LINUX_BUILD_LAYOUT=fedora-x86_64 \
            MOZKEY_LLAMA_ATTESTED_SHA256="${runtime_sha256}" \
            MOZKEY_ZENZ_LLAMA_SERVER_TARGET="${runtime}" \
            MOZKEY_ZENZ_LLAMA_SERVER_SOURCE="${runtime}" \
            ../scripts/preflight_mozkey_linux_bazel
          MOZKEY_LINUX_PREFLIGHT_DONE=1 \
            ../scripts/smoke_test_mozkey_fcitx5_install
          ../scripts/probe_zenz_runtime_bazel \
            --layout fedora-x86_64 \
            --llama-server "${runtime}" \
            --llama-server-sha256 "${runtime_sha256}"

      - name: Build the RPM package and provenance
        run: |
          MOZKEY_LINUX_OUTPUT_DIR="$(pwd)/dist" \
            scripts/package_mozkey_linux_rpm

      - name: Upload the verified Fedora/RPM product
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-linux-fedora-x86_64
          path: |
            dist/mozkey-ibg-*-1.x86_64.rpm
            dist/mozkey-v*-fedora-x86_64.build-attestation.json
            dist/mozkey-v*-fedora-x86_64.spdx.json
            dist/fedora-build-packages.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  package_archlinux:
    # A downloadable product is emitted only after both the Ubuntu compile /
    # layout job and the repository-wide test job are green.
    if: ${{ inputs.release == true }}
    needs: [prepare_daily_dictionary, build, test]
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    container: archlinux/archlinux@sha256:0cd360b9243ce17125ef37dee01e99d115e96321fd46d4b212b6a6247a5d6cea
    env:
      LANG: C.UTF-8
      LC_ALL: C.UTF-8

    steps:
      - name: Bootstrap the fixed Arch repository for checkout
        run: |
          cat > /etc/pacman.d/mirrorlist <<'EOF'
          Server = https://archive.archlinux.org/repos/2026/06/01/$repo/os/$arch
          EOF
          pacman -Syy --noconfirm
          pacman -S --noconfirm git

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Install the Arch Linux target build environment
        run: |
          tools/release/use_archlinux_snapshot.sh
          pacman -S --noconfirm --needed \
            appstream \
            bazelisk \
            fcitx5 \
            gettext \
            git \
            jdk-openjdk \
            llama-cpp \
            nodejs \
            npm \
            python \
            qt6-base \
            unzip \
            xz \
            zip

      - name: Download release-approved dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: linux-release-approved-dictionary
          path: .

      - name: Verify dictionary and record the fixed build environment
        run: |
          python tools/dictionary/verify_release_dictionary_artifact.py --root .
          mkdir -p dist
          pacman -Q \
            appstream \
            bazelisk \
            fcitx5 \
            gcc \
            glibc \
            llama-cpp \
            qt6-base \
            > dist/archlinux-build-packages.txt

      - name: Build the Arch Linux product
        run: |
          # The container runs as root while checkout files retain the
          # runner's ownership.  Trust this exact ephemeral workspace so the
          # attestation-producing scripts can inspect its Git metadata.
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"
          scripts/build_mozkey_linux_bazel archlinux-x86_64

      - name: Validate llama CLI, real GGUF inference, and staged product
        working-directory: ./src
        run: |
          ../scripts/verify_llama_server_compatibility /usr/bin/llama-server
          ../scripts/preflight_mozkey_linux_bazel
          MOZKEY_LINUX_PREFLIGHT_DONE=1 \
            ../scripts/smoke_test_mozkey_fcitx5_install
          ../scripts/probe_zenz_runtime_bazel

      - name: Build the Arch Linux payload, checksum, and SPDX inventory
        working-directory: ./src
        run: |
          MOZKEY_LINUX_OUTPUT_DIR="$(pwd)/../dist" \
            ../scripts/package_mozkey_linux_bazel

      - name: Upload the verified Arch Linux product
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-linux-archlinux-x86_64
          path: |
            dist/mozkey-v*-archlinux-x86_64.tar.xz
            dist/mozkey-v*-archlinux-x86_64.tar.xz.sha256
            dist/mozkey-v*-archlinux-x86_64.build-attestation.json
            dist/mozkey-v*-archlinux-x86_64.spdx.json
            dist/archlinux-build-packages.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  test:
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: linux-release-approved-dictionary
          path: .

      - name: Verify release-approved dictionary allowlist
        run: python tools/dictionary/verify_release_dictionary_artifact.py --root .

      - name: Setup
        run: |
          tools/release/use_ubuntu_snapshot.sh
          sudo apt-get install -y \
            fcitx5-modules-dev \
            gettext \
            gir1.2-glib-2.0 \
            libibus-1.0-dev \
            python3-dbus \
            python3-gi \
            qt6-base-dev
          #
          # Unset the Android NDK setting to skip the unnecessary configuration.
          echo "ANDROID_NDK_HOME=" >> $GITHUB_ENV

      - name: Test Linux release, installer, provenance, and Zenz gates
        run: |
          python tools/release/normalize_zenz_gguf.py create --root .
          python tools/release/normalize_zenz_gguf.py verify --root .
          python -m unittest \
            tools.check_no_network_checks_test \
            scripts.install_mozkey_linux_bazel_test \
            scripts.install_zenz_runtime_test \
            scripts.package_mozkey_linux_bazel_test \
            scripts.preflight_mozkey_linux_bazel_test \
            scripts.verify_llama_server_compatibility_test \
            tools.dictionary.daily_source_lock_test \
            tools.dictionary.prepare_daily_dictionary_linux_test \
            tools.dictionary.prepare_release_dictionary_native_test \
            tools.dictionary.verify_release_dictionary_artifact_test \
            tools.release.generate_linux_spdx_sbom_test \
            tools.release.linux_build_attestation_test \
            tools.release.prepare_linux_zenz_runtime_test \
            tools.release.linux_dogfood.atspi_surface_locator_policy_test \
            tools.release.linux_dogfood.consumer_fixture_policy_test \
            tools.release.linux_dogfood.fresh_profile_policy_test \
            tools.release.linux_dogfood.protected_surface_policy_test \
            tools.release.linux_dogfood.proc_visibility_policy_test \
            tools.release.normalize_zenz_gguf_test \
            tools.release.probe_zenz_runtime_test \
            tools.release.aur_repository_contract_test \
            tools.release.release_workflow_contract_test \
            tools.release.zenz_scorer_security_contract_test \
            tools.release.stop_mozkey_linux_runtime_test \
            tools.release.verify_staged_linux_payload_test
          python -m py_compile tools/release/linux_dogfood/*.py
          node --check tools/release/linux_dogfood/electron_scope_probe.mjs
          sh -n \
            scripts/build_mozkey_linux_bazel \
            scripts/fcitx5_install_paths \
            scripts/install_mozkey_linux_bazel \
            scripts/install_zenz_runtime \
            scripts/package_mozkey_linux_bazel \
            scripts/package_mozkey_linux_deb \
            scripts/package_mozkey_linux_rpm \
            scripts/preflight_mozkey_linux_bazel \
            scripts/probe_zenz_runtime_bazel \
            scripts/smoke_test_mozkey_fcitx5_install \
            scripts/stage_mozkey_linux_native_package \
            scripts/stop_mozkey_linux_runtime \
            scripts/uninstall_mozkey_fcitx5 \
            scripts/verify_mozkey_linux_build_attestation \
            scripts/verify_zenz_gguf_normalization \
            scripts/verify_llama_server_compatibility \
            tools/release/use_archlinux_snapshot.sh \
            tools/release/use_fedora_snapshot.sh \
            tools/release/use_ubuntu_snapshot.sh \
            tools/release/linux_dogfood/send_ime_sequence.sh

      - name: bazel test
        working-directory: ./src
        run: |
          bazelisk test ... -c dbg \
            --define=mozkey_dictionary_profile=release-approved-only
