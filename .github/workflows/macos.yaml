name: CI for macOS
# https://github.com/google/mozc/blob/master/docs/build_mozc_in_osx.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      release:
        description: Build and upload the release installer.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: macos-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare_daily_dictionary:
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    runs-on: macos-15
    timeout-minutes: 60
    outputs:
      release_version: ${{ steps.release_version.outputs.value }}

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Resolve Mozkey release version
        id: release_version
        run: |
          version="$(sed -n \
            -e 's/^MOZKEY_RELEASE_VERSION_MAJOR = //p' \
            -e 's/^MOZKEY_RELEASE_VERSION_MINOR = //p' \
            -e 's/^MOZKEY_RELEASE_VERSION_PATCH = //p' \
            src/version.bzl | paste -sd . -)"
          printf '%s\n' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'
          printf 'value=%s\n' "${version}" >> "${GITHUB_OUTPUT}"

      - name: Prepare daily dictionary
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          ./tools/dictionary/prepare_daily_dictionary.ps1 -ReleaseApprovedOnly

      - name: upload daily dictionary
        uses: actions/upload-artifact@v6
        with:
          name: macos-daily-dictionary
          path: |
            src/data/dictionary_koyasi/generated/**
            dist/dictionary/**
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  prepare_macos_zenz_runtime:
    if: ${{ inputs.release == true }}
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore pinned runtime source cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: macos-zenz-b9637-${{ hashFiles('tools/release/prepare_macos_zenz_runtime.py', 'src/build_tools/update_deps.py') }}

      - name: Install pinned Ninja
        run: |
          python3 src/build_tools/update_deps.py --noqt --nondk

      - name: Build pinned arm64 Zenz runtime
        run: |
          python3 tools/release/prepare_macos_zenz_runtime.py

      - name: Assert arm64 scorer and server Mach-O contracts
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from tools.release import prepare_macos_zenz_runtime as runtime

          generated = Path("src/mac/zenz_runtime/generated")
          runtime._verify_arm64_scorer(
              generated / runtime.SCORER_NAME
          )
          runtime._verify_arm64_server(generated / "llama-server")
          PY

      - name: Run runtime preparation contract tests
        run: |
          python3 -m unittest -v \
            tools.release.prepare_macos_zenz_runtime_test \
            tools.release.probe_macos_zenz_runtime_test
          PYTHONPATH=src python3 -m unittest -v mac.tweak_installer_files_test

      - name: Archive runtime with executable modes
        run: |
          tar -czf macos-arm64-zenz-runtime.tar.gz src/mac/zenz_runtime/generated

      - name: Upload arm64 Zenz runtime
        uses: actions/upload-artifact@v6
        with:
          name: macos-zenz-runtime-arm64-b9637
          path: macos-arm64-zenz-runtime.tar.gz
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  build_arm64:
    needs: [prepare_daily_dictionary, prepare_macos_zenz_runtime]
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@v6
        with:
          name: macos-daily-dictionary
          path: .

      - name: Download arm64 Zenz runtime
        uses: actions/download-artifact@v6
        with:
          name: macos-zenz-runtime-arm64-b9637
          path: .

      - name: Restore arm64 Zenz runtime
        run: |
          tar -xzf macos-arm64-zenz-runtime.tar.gz

      - name: Try to restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        working-directory: ./src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python3 build_tools/update_deps.py

      - name: Build Qt
        working-directory: ./src
        run: |
          python3 build_tools/build_qt.py --release --confirm_license --macos_cpus=arm64

      - name: bazel build
        working-directory: ./src
        run: |
          bazelisk build package --macos_cpus=arm64 --config release_build --define=mozkey_dictionary_profile=release-approved-only

      - name: Probe packaged arm64 scorer and server with real inference
        run: |
          python3 tools/release/probe_macos_zenz_runtime.py \
            --package src/bazel-bin/mac/Mozc.pkg \
            --timeout-seconds 300

      - name: Stage versioned arm64 package
        run: |
          mv src/bazel-bin/mac/Mozc.pkg \
            "Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_macos_arm64.pkg"

      - name: Upload versioned arm64 package
        uses: actions/upload-artifact@v6
        with:
          name: release-macos-arm64
          path: Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_macos_arm64.pkg
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  test:
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@v6
        with:
          name: macos-daily-dictionary
          path: .

      - name: Try to restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        working-directory: ./src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python3 build_tools/update_deps.py

      - name: bazel test
        working-directory: ./src
        run: |
          bazelisk test ... --build_tests_only -c dbg --test_output=errors --define=mozkey_dictionary_profile=release-approved-only

      - name: Run portable Grimodex and macOS runtime contract tests
        working-directory: ./src
        run: |
          bazelisk build //zenz_scorer:mozc_zenz_scorer -c dbg --define=mozkey_dictionary_profile=release-approved-only
          bazelisk test //grimodex:portable_protocol_v1_tests //grimodex:protocol_v1_secure_reader_test //grimodex:consumer_file_registrar_posix_test //mac:mozc_imk_input_controller_test //mac:renderer_receiver_test //renderer:candidate_view_callback_test //session:zenz_named_pipe_client_test //session:zenz_named_pipe_availability_test -c dbg --test_output=errors --define=mozkey_dictionary_profile=release-approved-only

      - name: Run macOS Zenz runtime script tests
        run: |
          python3 -m unittest -v \
            tools.release.prepare_macos_zenz_runtime_test \
            tools.release.probe_macos_zenz_runtime_test
          PYTHONPATH=src python3 -m unittest -v mac.tweak_installer_files_test
