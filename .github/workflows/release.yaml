name: Mozkey Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

concurrency:
  group: mozkey-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-gate:
    name: Validate release identity and main ancestry
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.validate.outputs.tag }}
      version: ${{ steps.validate.outputs.version }}
      commit: ${{ steps.validate.outputs.commit }}
    steps:
      - name: Checkout the release ref with main history
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate tag, version.bzl, checkout, and main ancestry
        id: validate
        env:
          RELEASE_TAG: ${{ github.ref_name }}
          RELEASE_REF_TYPE: ${{ github.ref_type }}
        run: >-
          python tools/release/validate_mozkey_release.py
          --tag "$RELEASE_TAG"
          --ref-type "$RELEASE_REF_TYPE"
          --version-file src/version.bzl
          --repository .
          --main-ref origin/main

      - name: Refuse an already published release before product builds
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.validate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            > "$RUNNER_TEMP/release-gate-existing.json" \
            2> "$RUNNER_TEMP/release-gate-existing.err"; then
            if [ "$(jq -r '.draft' "$RUNNER_TEMP/release-gate-existing.json")" != "true" ]; then
              echo "::error::Release ${RELEASE_TAG} is already published." >&2
              exit 1
            fi
          elif ! grep -q 'HTTP 404' "$RUNNER_TEMP/release-gate-existing.err"; then
            cat "$RUNNER_TEMP/release-gate-existing.err" >&2
            exit 1
          fi

  linux:
    name: Linux release artifacts
    needs: release-gate
    permissions:
      contents: read
    uses: ./.github/workflows/linux.yaml
    with:
      release: true

  macos:
    name: macOS release artifacts
    needs: release-gate
    permissions:
      contents: read
    uses: ./.github/workflows/macos.yaml
    with:
      release: true
    secrets:
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_INSTALLER_CERTIFICATE: ${{ secrets.APPLE_INSTALLER_CERTIFICATE }}
      APPLE_INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

  windows:
    name: Windows release artifacts
    needs: release-gate
    permissions:
      contents: read
    uses: ./.github/workflows/windows.yaml
    with:
      release: true

  secure_offline:
    name: Secure offline release gate
    needs: release-gate
    permissions:
      contents: read
    uses: ./.github/workflows/secure-offline.yaml

  publish:
    name: Create or update draft prerelease
    needs: [release-gate, linux, macos, windows, secure_offline]
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release metadata
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Refuse to mutate a published release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            > "$RUNNER_TEMP/existing-release.json" \
            2> "$RUNNER_TEMP/existing-release.err"; then
            if [ "$(jq -r '.draft' "$RUNNER_TEMP/existing-release.json")" != "true" ]; then
              echo "::error::Refusing to mutate published release ${RELEASE_TAG}." >&2
              exit 1
            fi
          elif grep -q 'HTTP 404' "$RUNNER_TEMP/existing-release.err"; then
            rm -f "$RUNNER_TEMP/existing-release.json"
          else
            cat "$RUNNER_TEMP/existing-release.err" >&2
            exit 1
          fi

      - name: Download release artifacts only
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          pattern: release-*
          path: release-artifacts

      - name: Flatten release assets and generate SHA256SUMS
        env:
          RELEASE_VERSION: ${{ needs.release-gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish-assets
          while IFS= read -r -d '' asset; do
            name=$(basename "$asset")
            if [ -e "publish-assets/$name" ]; then
              echo "::error::Duplicate release asset filename: $name" >&2
              exit 1
            fi
            cp "$asset" "publish-assets/$name"
          done < <(find release-artifacts -type f -print0 | sort -z)

          if ! find publish-assets -maxdepth 1 -type f -print -quit | grep -q .; then
            echo "::error::No files were found in release-* workflow artifacts." >&2
            exit 1
          fi

          expected_product_assets=(
            "Mozkey_v${RELEASE_VERSION}_arm64.msi"
            "Mozkey_v${RELEASE_VERSION}_macos_arm64.pkg"
            "Mozkey_v${RELEASE_VERSION}_universal.msi"
            "Mozkey_v${RELEASE_VERSION}_x64.msi"
            "archlinux-build-packages.txt"
            "fedora-build-packages.txt"
            "mozkey-ibg-${RELEASE_VERSION}-1.x86_64.rpm"
            "mozkey-ibg_${RELEASE_VERSION}_amd64.deb"
            "mozkey-v${RELEASE_VERSION}-archlinux-x86_64.build-attestation.json"
            "mozkey-v${RELEASE_VERSION}-archlinux-x86_64.spdx.json"
            "mozkey-v${RELEASE_VERSION}-archlinux-x86_64.tar.xz"
            "mozkey-v${RELEASE_VERSION}-archlinux-x86_64.tar.xz.sha256"
            "mozkey-v${RELEASE_VERSION}-fedora-x86_64.build-attestation.json"
            "mozkey-v${RELEASE_VERSION}-fedora-x86_64.spdx.json"
            "mozkey-v${RELEASE_VERSION}-ubuntu-x86_64.build-attestation.json"
            "mozkey-v${RELEASE_VERSION}-ubuntu-x86_64.spdx.json"
            "ubuntu-build-packages.txt"
          )
          printf '%s\n' "${expected_product_assets[@]}" \
            | LC_ALL=C sort > "$RUNNER_TEMP/expected-product-assets.txt"
          find publish-assets -maxdepth 1 -type f -printf '%f\n' \
            | LC_ALL=C sort > "$RUNNER_TEMP/actual-product-assets.txt"
          if ! diff -u \
            "$RUNNER_TEMP/expected-product-assets.txt" \
            "$RUNNER_TEMP/actual-product-assets.txt"; then
            echo "::error::Release artifact set does not match the desktop product allowlist." >&2
            exit 1
          fi

          (
            cd publish-assets
            sha256sum "${expected_product_assets[@]}" > SHA256SUMS
          )
          test -s publish-assets/SHA256SUMS
          {
            printf '%s\n' "${expected_product_assets[@]}"
            printf '%s\n' SHA256SUMS
          } | LC_ALL=C sort > "$RUNNER_TEMP/expected-release-assets.txt"

      - name: Attest release assets and SHA256SUMS
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6  # v4.2.0
        with:
          subject-path: publish-assets/*

      - name: Generate release notes with GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gate.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$RELEASE_TAG" \
            --jq '.body' > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ] || ! grep -q '[^[:space:]]' "$NOTES_FILE"; then
            echo "::error::Release notes generation returned an empty body." >&2
            exit 1
          fi
          printf '\n\n<!-- release-notes-generator: github-generate-notes -->\n' \
            >> "$NOTES_FILE"
          echo "RELEASE_NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Recreate the draft prerelease asset set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.release-gate.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release-gate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          current_release="$RUNNER_TEMP/current-release.json"
          require_mutable_draft() {
            gh api "repos/${GITHUB_REPOSITORY}/releases/${release_id}" \
              > "$current_release"
            if [ "$(jq -r '.draft' "$current_release")" != "true" ] || \
               [ "$(jq -r '.immutable // false' "$current_release")" != "false" ]; then
              echo "::error::Release ${RELEASE_TAG} is no longer a mutable draft." >&2
              exit 1
            fi
          }

          find_draft_release_id() {
            gh api --paginate --slurp \
              "repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              | jq -r --arg tag "$RELEASE_TAG" \
                  'add[] | select(.tag_name == $tag and .draft == true) | .id' \
              | head -n 1
          }

          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" \
            > "$current_release" \
            2> "$RUNNER_TEMP/current-release.err"; then
            release_id="$(jq -r '.id' "$current_release")"
            require_mutable_draft
            gh release edit "$RELEASE_TAG" \
              --prerelease \
              --title "Mozkey v${RELEASE_VERSION}" \
              --notes-file "$RELEASE_NOTES_FILE"
          elif grep -q 'HTTP 404' "$RUNNER_TEMP/current-release.err"; then
            release_id="$(find_draft_release_id)"
            if [ -z "$release_id" ]; then
              gh release create "$RELEASE_TAG" \
                --verify-tag \
                --draft \
                --prerelease \
                --title "Mozkey v${RELEASE_VERSION}" \
                --notes-file "$RELEASE_NOTES_FILE"
              release_id="$(find_draft_release_id)"
            fi
            if [ -z "$release_id" ]; then
              echo "::error::Unable to resolve the draft release ${RELEASE_TAG}." >&2
              exit 1
            fi
            require_mutable_draft
            gh release edit "$RELEASE_TAG" \
              --prerelease \
              --title "Mozkey v${RELEASE_VERSION}" \
              --notes-file "$RELEASE_NOTES_FILE"
          else
            cat "$RUNNER_TEMP/current-release.err" >&2
            exit 1
          fi

          require_mutable_draft
          mapfile -t existing_asset_ids < <(
            gh api --paginate \
              "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
              --jq '.[].id'
          )
          for asset_id in "${existing_asset_ids[@]}"; do
            require_mutable_draft
            gh api --method DELETE \
              "repos/${GITHUB_REPOSITORY}/releases/assets/${asset_id}"
          done

          require_mutable_draft
          : > "$RUNNER_TEMP/empty-release-assets.txt"
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
            --jq '.[].name' \
            | LC_ALL=C sort > "$RUNNER_TEMP/pre-upload-release-assets.txt"
          if ! diff -u \
            "$RUNNER_TEMP/empty-release-assets.txt" \
            "$RUNNER_TEMP/pre-upload-release-assets.txt"; then
            echo "::error::Draft release still has assets after cleanup." >&2
            exit 1
          fi

          find publish-assets -maxdepth 1 -type f -printf '%f\n' \
            | LC_ALL=C sort > "$RUNNER_TEMP/local-release-assets.txt"
          if ! diff -u \
            "$RUNNER_TEMP/expected-release-assets.txt" \
            "$RUNNER_TEMP/local-release-assets.txt"; then
            echo "::error::Local release asset set changed before upload." >&2
            exit 1
          fi

          mapfile -d '' assets < <(find publish-assets -maxdepth 1 -type f -print0 | sort -z)
          require_mutable_draft
          gh release upload "$RELEASE_TAG" "${assets[@]}"

          require_mutable_draft
          gh api --paginate \
            "repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?per_page=100" \
            --jq '.[].name' \
            | LC_ALL=C sort > "$RUNNER_TEMP/post-upload-release-assets.txt"
          if ! diff -u \
            "$RUNNER_TEMP/expected-release-assets.txt" \
            "$RUNNER_TEMP/post-upload-release-assets.txt"; then
            echo "::error::Uploaded release asset set does not match the allowlist." >&2
            exit 1
          fi
