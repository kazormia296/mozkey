name: Secure Offline Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-secure-offline-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  source_check:
    name: No-network source check
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Check prohibited network symbols
        shell: pwsh
        run: |
          python tools\check_no_network_symbols.py

  config_tests:
    name: Offline config tests
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Run offline config tests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test --config oss_windows --config release_build --test_output=errors //config:stats_config_util_test //config:config_handler_test

  binary_check:
    name: Binary no-network check
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Pin Bazel to Visual Studio 2026
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          $vs = & $vswhere `
            -version "[18.0,19.0)" `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $vs) {
            throw "Visual Studio 2026 with VC tools was not found."
          }

          $vc = Join-Path $vs "VC"

          if (!(Test-Path $vc)) {
            throw "VC path not found: $vc"
          }

          "BAZEL_VS=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BAZEL_VC=$vc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Pinned BAZEL_VS=$vs"
          Write-Host "Pinned BAZEL_VC=$vc"

          Write-Host "CRT redist root:"
          Write-Host (Join-Path $vc "Redist\MSVC")

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Prepare pinned x64 Zenz runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $destinationRoot = Join-Path $env:BAZEL_VC "Redist\MSVC\14.51.36247\x64\Microsoft.VC145.CRT"
          .\tools\release\verify_windows_crt.ps1 `
            -Architecture x64 `
            -DestinationRoot $destinationRoot

      - name: Build Windows package
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --config oss_windows --config release_build package

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          .\tools\release\check_windows_msi_offline.ps1 `
            -Path .\src\bazel-bin\win32\installer\Mozc64.msi `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ExpectedRuntimeArchitecture x64

      - name: Probe x64 Zenz loopback runtime
        shell: pwsh
        run: |
          .\tools\release\probe_windows_zenz_runtime.ps1 `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ModelPath .\src\win32\installer\zenz_runtime\generated\x64\models\zenz-v3.2-small-Q5_K_M.gguf

      - name: Upload MSI
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: Mozc64.msi
          path: src/bazel-bin/win32/installer/Mozc64.msi
          if-no-files-found: error
          overwrite: true
          retention-days: 7
