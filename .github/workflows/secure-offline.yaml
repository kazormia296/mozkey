name: Secure Offline Checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-secure-offline-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  source_check:
    name: No-network source check
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Check prohibited network symbols
        shell: pwsh
        run: |
          python tools\check_no_network_symbols.py

  config_tests:
    name: Offline config tests
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Restore Bazel repository cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/.bazel-repository-cache
          key: bazel-repository-${{ runner.os }}-${{ hashFiles('src/MODULE.bazel', 'src/bazel/**/*.bzl', 'src/bazel/**/*.patch') }}

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Hydrate Bazel repositories
        shell: pwsh
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          $arguments = @(
            "fetch",
            "--repository_cache=.bazel-repository-cache",
            "--config", "oss_windows",
            "--config", "release_build",
            "//config:stats_config_util_test",
            "//config:config_handler_test"
          )

          for ($attempt = 1; $attempt -le 3; $attempt++) {
            & bazelisk @arguments
            $exitCode = $LASTEXITCODE
            if ($exitCode -eq 0) {
              break
            }
            if ($attempt -eq 3) {
              exit $exitCode
            }
            Write-Warning "Bazel repository hydration failed on attempt $attempt; retrying."
            Start-Sleep -Seconds (15 * $attempt)
          }

      - name: Run offline config tests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test --repository_cache=.bazel-repository-cache --config oss_windows --config release_build --test_output=errors //config:stats_config_util_test //config:config_handler_test

  binary_check:
    name: Binary no-network check
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Restore Bazel repository cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/.bazel-repository-cache
          key: bazel-repository-${{ runner.os }}-${{ hashFiles('src/MODULE.bazel', 'src/bazel/**/*.bzl', 'src/bazel/**/*.patch') }}

      - name: Pin Bazel to Visual Studio 2026
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          $vs = & $vswhere `
            -version "[18.0,19.0)" `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $vs) {
            throw "Visual Studio 2026 with VC tools was not found."
          }

          $vc = Join-Path $vs "VC"

          if (!(Test-Path $vc)) {
            throw "VC path not found: $vc"
          }

          "BAZEL_VS=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BAZEL_VC=$vc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Pinned BAZEL_VS=$vs"
          Write-Host "Pinned BAZEL_VC=$vc"

          Write-Host "CRT redist root:"
          Write-Host (Join-Path $vc "Redist\MSVC")

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Verify CRT redist selected by Visual Studio
        shell: pwsh
        run: |
          .\tools\release\verify_windows_crt.ps1 `
            -Architecture x64

      - name: Build Windows Zenz scorer
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --repository_cache=.bazel-repository-cache --config oss_windows --config release_build //zenz_scorer:mozc_zenz_scorer

      - name: Prepare pinned x64 Zenz runtime
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Inspect Windows runtime binaries
        shell: pwsh
        run: |
          $scorer = ".\src\bazel-bin\zenz_scorer\mozc_zenz_scorer.exe"
          $runtime = ".\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe"

          python .\tools\check_no_network_imports.py $scorer $runtime
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\check_no_network_strings.py $scorer $runtime
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Probe x64 Zenz loopback runtime
        shell: pwsh
        run: |
          .\tools\release\probe_windows_zenz_runtime.ps1 `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ModelPath .\src\win32\installer\zenz_runtime\generated\x64\models\zenz-v3.2-small-Q5_K_M.gguf
