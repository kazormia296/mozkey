name: Secure Offline Checks

on:
  push:
    branches:
      - my-product
      - "feature/**"
      - "fix/**"
      - "harden/**"
      - "chore/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  source_check:
    name: No-network source check
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Check prohibited network symbols
        shell: pwsh
        run: |
          python tools\check_no_network_symbols.py

  config_tests:
    name: Offline config tests
    runs-on: windows-2025
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Run offline config tests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test --config oss_windows --config release_build --test_output=errors //config:stats_config_util_test //config:config_handler_test

  binary_check:
    name: Binary no-network check
    runs-on: windows-2022
    timeout-minutes: 120
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Pin Bazel to Visual Studio 2022
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"

          $vs = & $vswhere `
            -version "[17.0,18.0)" `
            -products * `
            -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
            -property installationPath

          if (-not $vs) {
            throw "Visual Studio 2022 with VC tools was not found."
          }

          $vc = Join-Path $vs "VC"

          if (!(Test-Path $vc)) {
            throw "VC path not found: $vc"
          }

          "BAZEL_VS=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "BAZEL_VC=$vc" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          Write-Host "Pinned BAZEL_VS=$vs"
          Write-Host "Pinned BAZEL_VC=$vc"

          Write-Host "Available CRT redist files:"
          Get-ChildItem (Join-Path $vc "Redist\MSVC") -Recurse -Filter msvcp140.dll |
            Select-Object FullName

      - name: Install dependencies
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/update_deps.py

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $expectedDir = "C:\Program Files\Microsoft Visual Studio\18\Community\VC\Redist\MSVC\14.50.35710\x64\Microsoft.VC145.CRT"

          $requiredDlls = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll"
          )

          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022",
            "C:\Program Files\Microsoft Visual Studio\17",
            "C:\Program Files\Microsoft Visual Studio\18",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022",
            "C:\Program Files (x86)\Microsoft Visual Studio\17",
            "C:\Program Files (x86)\Microsoft Visual Studio\18"
          ) | Where-Object { Test-Path $_ }

          Write-Host "Expected CRT redist dir:"
          Write-Host $expectedDir

          Write-Host "Search roots:"
          $searchRoots | ForEach-Object { Write-Host $_ }

          New-Item -ItemType Directory -Force $expectedDir | Out-Null

          foreach ($dll in $requiredDlls) {
            $source = Get-ChildItem -Path $searchRoots -Recurse -Filter $dll -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\x64\\Microsoft\.VC[0-9]+\.CRT\\" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1

            if (-not $source) {
              Write-Host "Available CRT directories:"
              Get-ChildItem -Path $searchRoots -Recurse -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "\\x64\\Microsoft\.VC[0-9]+\.CRT$" } |
                Select-Object FullName

              throw "Required CRT DLL was not found: $dll"
            }

            $destination = Join-Path $expectedDir $dll
            Copy-Item $source.FullName $destination -Force
            Write-Host "Copied $dll"
            Write-Host "  from: $($source.FullName)"
            Write-Host "  to:   $destination"
          }

          Write-Host "Prepared CRT redist directory:"
          Get-ChildItem $expectedDir | Select-Object FullName

      - name: Build Windows package
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --config oss_windows --config release_build package

      - name: Check Bazel output network DLL imports
        shell: pwsh
        run: |
          python tools\check_no_network_imports.py --root src\bazel-bin

      - name: Check Bazel output string markers
        shell: pwsh
        run: |
          python tools\check_no_network_strings.py --root src\bazel-bin

      - name: Extract MSI
        shell: pwsh
        run: |
          $extractDir = Join-Path $PWD "msi_extract"
          Remove-Item $extractDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $extractDir | Out-Null

          $msi = Resolve-Path "src\bazel-bin\win32\installer\Mozc64.msi"

          & msiexec.exe /a "$msi" /qn TARGETDIR="$extractDir"
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

          Get-ChildItem $extractDir -Recurse -Include "mozc*.exe","mozc*.dll" |
            Select-Object FullName

      - name: Check MSI-extracted network DLL imports
        shell: pwsh
        run: |
          python tools\check_no_network_imports.py --root msi_extract

      - name: Check MSI-extracted string markers
        shell: pwsh
        run: |
          python tools\check_no_network_strings.py --root msi_extract

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Mozc64.msi
          path: src/bazel-bin/win32/installer/Mozc64.msi
          if-no-files-found: warn
