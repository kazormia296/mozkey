name: CI for Windows
# https://github.com/google/mozc/blob/master/docs/build_mozc_in_windows.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      release:
        description: Build and upload release installers.
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: windows-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  prepare_daily_dictionary:
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 60
    outputs:
      release_version: ${{ steps.release_version.outputs.value }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Resolve Mozkey release version
        id: release_version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $versionFile = Get-Content .\src\version.bzl -Raw
          $parts = foreach ($name in @("MAJOR", "MINOR", "PATCH")) {
            $pattern = "(?m)^MOZKEY_RELEASE_VERSION_${name} = ([0-9]+)$"
            $match = [regex]::Match($versionFile, $pattern)
            if (-not $match.Success) {
              throw "Could not resolve MOZKEY_RELEASE_VERSION_${name}."
            }
            $match.Groups[1].Value
          }
          "value=$($parts -join '.')" | Out-File `
            -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Prepare daily dictionary
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          .\tools\dictionary\prepare_daily_dictionary.ps1 -ReleaseApprovedOnly

      - name: upload daily dictionary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: windows-daily-dictionary
          path: |
            src/data/dictionary_koyasi/generated/**
            dist/dictionary/**
          if-no-files-found: error
          overwrite: true
          retention-days: 1

  build_x64:
    needs: prepare_daily_dictionary
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: windows-daily-dictionary
          path: .

      - name: Try to restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Prepare pinned x64 Zenz runtime
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $vc = (& python .\src\build_tools\vs_util.py --arch x64 | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $destinationRoot = Join-Path $vc "Redist\MSVC\14.50.35710\x64\Microsoft.VC145.CRT"
          .\tools\release\verify_windows_crt.ps1 `
            -Architecture x64 `
            -DestinationRoot $destinationRoot

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --config release_build --define=mozkey_dictionary_profile=release-approved-only package

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          .\tools\release\check_windows_msi_offline.ps1 `
            -Path .\src\bazel-bin\win32\installer\Mozc64.msi `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ExpectedRuntimeArchitecture x64

      - name: Probe x64 Zenz loopback runtime
        shell: pwsh
        run: |
          .\tools\release\probe_windows_zenz_runtime.ps1 `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ModelPath .\src\win32\installer\zenz_runtime\generated\x64\models\zenz-v3.2-small-Q5_K_M.gguf

      - name: Stage versioned x64 MSI
        shell: pwsh
        run: |
          $destination = "Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_x64.msi"
          Move-Item `
            -LiteralPath .\src\bazel-bin\win32\installer\Mozc64.msi `
            -Destination $destination

      - name: Upload versioned x64 MSI
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-windows-x64
          path: Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_x64.msi
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  build_universal:
    needs: prepare_daily_dictionary
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: recursive
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: windows-daily-dictionary
          path: .

      - name: Try to restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Prepare pinned x64 Zenz runtime
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $vc = (& python .\src\build_tools\vs_util.py --arch x64 | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $destinationRoot = Join-Path $vc "Redist\MSVC\14.50.35710\x64\Microsoft.VC145.CRT"
          .\tools\release\verify_windows_crt.ps1 `
            -Architecture x64 `
            -DestinationRoot $destinationRoot

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --config release_build --config win_universal_installer --define=mozkey_dictionary_profile=release-approved-only package

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          .\tools\release\check_windows_msi_offline.ps1 `
            -Path .\src\bazel-bin\win32\installer\Mozc64.msi `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ExpectedRuntimeArchitecture x64

      - name: Probe universal x64 Zenz loopback runtime
        shell: pwsh
        run: |
          .\tools\release\probe_windows_zenz_runtime.ps1 `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ModelPath .\src\win32\installer\zenz_runtime\generated\x64\models\zenz-v3.2-small-Q5_K_M.gguf

      - name: Stage versioned universal MSI
        shell: pwsh
        run: |
          $destination = "Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_universal.msi"
          Move-Item `
            -LiteralPath .\src\bazel-bin\win32\installer\Mozc64.msi `
            -Destination $destination

      - name: Upload versioned universal MSI
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-windows-universal
          path: Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_universal.msi
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  build_arm64:
    needs: prepare_daily_dictionary
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: windows-daily-dictionary
          path: .

      - name: Try to restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Prepare pinned ARM64 Zenz runtime
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch arm64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch arm64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt (arm64)
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license --target_arch=arm64

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $vc = (& python .\src\build_tools\vs_util.py --arch arm64 | Select-Object -Last 1).Trim()
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          $destinationRoot = Join-Path $vc "Redist\MSVC\14.50.35710\arm64\Microsoft.VC145.CRT"
          .\tools\release\verify_windows_crt.ps1 `
            -Architecture arm64 `
            -DestinationRoot $destinationRoot

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build package --config release_build --platforms=//:windows-arm64 --define=mozkey_dictionary_profile=release-approved-only

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          .\tools\release\check_windows_msi_offline.ps1 `
            -Path .\src\bazel-bin\win32\installer\Mozc64.msi `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\arm64\llama-server.exe `
            -ExpectedRuntimeArchitecture arm64

      - name: Stage versioned ARM64 MSI
        shell: pwsh
        run: |
          $destination = "Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_arm64.msi"
          Move-Item `
            -LiteralPath .\src\bazel-bin\win32\installer\Mozc64.msi `
            -Destination $destination

      - name: Upload versioned ARM64 MSI
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6
        with:
          name: release-windows-arm64
          path: Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_arm64.msi
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  test:
    needs: prepare_daily_dictionary
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53  # v6
        with:
          name: windows-daily-dictionary
          path: .

      - name: Test Windows release and uninstall contracts
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python -m unittest -v `
            tools.release.prepare_windows_zenz_runtime_test `
            tools.release.windows_uninstall_contract_test

      - name: Try to restore update_deps cache
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25  # v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: runtests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test ... -c dbg --build_tests_only --test_output=errors --define=mozkey_dictionary_profile=release-approved-only

      - name: Run portable Grimodex and Windows runtime contract tests
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk test //grimodex:portable_protocol_v1_tests //grimodex:protocol_v1_windows_secure_reader_test //grimodex:consumer_file_registrar_windows_test //protocol:renderer_callback_provenance_test //win32/tip:tip_edit_session_test //win32/tip:tip_grimodex_client_context_test //win32/tip:tip_grimodex_context_util_test //win32/tip:tip_input_mode_manager_test //session:zenz_named_pipe_client_test //session:zenz_named_pipe_availability_test -c dbg --test_output=errors --define=mozkey_dictionary_profile=release-approved-only
