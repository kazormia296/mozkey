      - name: Prepare pinned x64 Zenz runtime
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch x64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $expectedDir = "C:\Program Files\Microsoft Visual Studio\18\Community\VC\Redist\MSVC\14.50.35710\x64\Microsoft.VC145.CRT"

          $requiredDlls = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll"
          )

          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022",
            "C:\Program Files\Microsoft Visual Studio\17",
            "C:\Program Files\Microsoft Visual Studio\18",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022",
            "C:\Program Files (x86)\Microsoft Visual Studio\17",
            "C:\Program Files (x86)\Microsoft Visual Studio\18"
          ) | Where-Object { Test-Path $_ }

          Write-Host "Expected CRT redist dir:"
          Write-Host $expectedDir

          Write-Host "Search roots:"
          $searchRoots | ForEach-Object { Write-Host $_ }

          New-Item -ItemType Directory -Force $expectedDir | Out-Null

          foreach ($dll in $requiredDlls) {
            $source = Get-ChildItem -Path $searchRoots -Recurse -Filter $dll -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\x64\\Microsoft\.VC[0-9]+\.CRT\\" } |
              Sort-Object FullName -Descending |
              Select-Object -First 1

            if (-not $source) {
              Write-Host "Available CRT directories:"
              Get-ChildItem -Path $searchRoots -Recurse -Directory -ErrorAction SilentlyContinue |
                Where-Object { $_.FullName -match "\\x64\\Microsoft\.VC[0-9]+\.CRT$" } |
                Select-Object FullName

              throw "Required CRT DLL was not found: $dll"
            }

            $destination = Join-Path $expectedDir $dll
            Copy-Item $source.FullName $destination -Force
            Write-Host "Copied $dll"
            Write-Host "  from: $($source.FullName)"
            Write-Host "  to:   $destination"
          }

          Write-Host "Prepared CRT redist directory:"
          Get-ChildItem $expectedDir | Select-Object FullName

      - name: build artifacts
        shell: cmd
        working-directory: .\src
        env:
          ANDROID_NDK_HOME: ""
        run: |
          bazelisk build --config release_build --config win_universal_installer --define=mozkey_dictionary_profile=release-approved-only package

      - name: Verify MSI artifact
        shell: pwsh
        run: |
          .\tools\release\verify_windows_msi.ps1 `
            -Path .\src\bazel-bin\win32\installer\Mozc64.msi `
            -RuntimePath .\src\win32\installer\zenz_runtime\generated\x64\llama-server.exe `
            -ExpectedRuntimeArchitecture x64

      - name: Stage versioned universal MSI
        shell: pwsh
        run: |
          $destination = "Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_universal.msi"
          Move-Item `
            -LiteralPath .\src\bazel-bin\win32\installer\Mozc64.msi `
            -Destination $destination

      - name: Upload versioned universal MSI
        uses: actions/upload-artifact@v6
        with:
          name: release-windows-universal
          path: Mozkey_v${{ needs.prepare_daily_dictionary.outputs.release_version }}_universal.msi
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  build_arm64:
    needs: prepare_daily_dictionary
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/windows/Windows2025-Readme.md
    runs-on: windows-2025
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: download daily dictionary
        uses: actions/download-artifact@v6
        with:
          name: windows-daily-dictionary
          path: .

      - name: Try to restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install Dependencies
        shell: cmd
        working-directory: .\src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python build_tools/update_deps.py

      - name: Prepare pinned ARM64 Zenz runtime
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          $ErrorActionPreference = "Stop"
          python .\tools\release\prepare_windows_zenz_runtime.py --arch arm64
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          python .\tools\release\prepare_windows_zenz_runtime.py --arch arm64 --verify-only
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Qt (arm64)
        shell: cmd
        working-directory: .\src
        run: |
          python build_tools/build_qt.py --release --confirm_license --target_arch=arm64

      # This is needed only for GitHub Actions where free disk space is quite limited.
      - name: Delete Qt src to save disk space
        shell: cmd
        working-directory: .\src
        run: |
          rmdir third_party\qt_src /s /q

      - name: Prepare CRT redist directory expected by WiX
        shell: pwsh
        run: |
          $expectedDir = "C:\Program Files\Microsoft Visual Studio\18\Community\VC\Redist\MSVC\14.50.35710\arm64\Microsoft.VC145.CRT"

          $requiredDlls = @(
            "msvcp140.dll",
            "msvcp140_1.dll",
            "msvcp140_2.dll",
            "vcruntime140.dll",
            "vcruntime140_1.dll"
          )

          $searchRoots = @(
            "C:\Program Files\Microsoft Visual Studio\2022",
            "C:\Program Files\Microsoft Visual Studio\17",
            "C:\Program Files\Microsoft Visual Studio\18",
            "C:\Program Files (x86)\Microsoft Visual Studio\2022",
            "C:\Program Files (x86)\Microsoft Visual Studio\17",
            "C:\Program Files (x86)\Microsoft Visual Studio\18"
          ) | Where-Object { Test-Path $_ }

