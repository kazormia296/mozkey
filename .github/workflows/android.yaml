name: CI for Android
# https://github.com/google/mozc/blob/master/docs/build_mozc_for_android.md

on:
  workflow_call:
    inputs:
      release:
        description: Build Android release artifacts
        required: false
        type: boolean
        default: false

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: ci-android-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build_on_linux:
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: setup
        run: |
          sudo apt-get update

      - name: Try to restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        working-directory: ./src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python3 build_tools/update_deps.py

      - name: build
        working-directory: ./src
        run: |
          bazelisk build --config oss_android package --config release_build

      - name: Stage versioned Android native libraries
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n \
            -e 's/^MOZKEY_RELEASE_VERSION_MAJOR = //p' \
            -e 's/^MOZKEY_RELEASE_VERSION_MINOR = //p' \
            -e 's/^MOZKEY_RELEASE_VERSION_PATCH = //p' \
            src/version.bzl | paste -sd . -)"
          printf '%s\n' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'
          mv src/bazel-bin/android/jni/native_libs.zip \
            "mozkey-v${version}-android-native-libs.zip"

      - name: Upload versioned Android native libraries
        uses: actions/upload-artifact@v6
        with:
          name: release-android-native-libs
          path: mozkey-v*-android-native-libs.zip
          if-no-files-found: error
          overwrite: true
          retention-days: 7

  build_on_mac:
    if: ${{ inputs.release == true }}
    # https://github.com/actions/runner-images/blob/main/images/macos/macos-15-arm64-Readme.md
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          submodules: false
          persist-credentials: false

      - name: Try to restore update_deps cache
        uses: actions/cache@v5
        with:
          path: src/third_party_cache
          key: update_deps-${{ runner.os }}-${{ hashFiles('src/build_tools/update_deps.py') }}

      - name: Install dependencies
        working-directory: ./src
        # This command uses src/third_party_cache as the download cache.
        run: |
          python3 build_tools/update_deps.py

      - name: build
        working-directory: ./src
        run: |
          bazelisk build --config oss_android package --config release_build
