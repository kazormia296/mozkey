name: CI for Lint checks
# https://github.com/google/mozc/blob/master/docs/build_mozc_in_docker.md

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

permissions:
  contents: read

# Prevent previous workflows from running.
concurrency:
  group: ci-lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  buildifier:
    # https://github.com/actions/runner-images/blob/main/images/ubuntu/Ubuntu2404-Readme.md
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      # Checkout without submodules to exclude third_party code from lint check
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          submodules: false
          persist-credentials: false

      - name: Verify canonical repository metadata
        run: python -m unittest tools.release.aur_repository_contract_test

      - name: Run
        working-directory: ./src
        run: |
          go install github.com/bazelbuild/buildtools/v8/buildifier@v8.5.1
          $(go env GOPATH)/bin/buildifier --mode=diff -r .
